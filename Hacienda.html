<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacienda | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .agro-widgets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .widget-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 15px;
            min-height: 120px;
        }
        .hacienda-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .hacienda-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hacienda-card:hover {
            border-color: var(--success);
            transform: translateY(-4px);
        }
        .hacienda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #151515;
            padding-bottom: 12px;
        }
        .category-name {
            font-weight: 700;
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hacienda-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .price-main {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
        }
        .price-label {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .trend-indicator {
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 2px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .trend-up { background: var(--success-glow); color: var(--success); }
        .trend-down { background: var(--error-glow); color: var(--error); }
        .hacienda-footer {
            font-size: 0.7rem;
            color: #444;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">Mercado de Hacienda</h1>

    <div class="agro-widgets">
        <div class="widget-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                { "symbol": "MATBAROFEX:SOJCONT", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
                </script>
            </div>
        </div>
        <div class="widget-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                { "symbol": "MATBAROFEX:MAICONT", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
                </script>
            </div>
        </div>
        <div class="widget-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
                { "symbol": "MATBAROFEX:TRICONT", "colorTheme": "dark", "isTransparent": true, "width": "100%" }
                </script>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="agro-pill-selector" style="margin-bottom: 0;">
            <button id="btn-ars" class="agro-pill active">ARS</button>
            <button id="btn-usd" class="agro-pill">USD (Oficial)</button>
        </div>
        <button id="refresh-hacienda" class="btn btn-sm">🔄 Actualizar Cañuelas</button>
    </div>

    <div id="hacienda-container" class="hacienda-grid">
        <!-- Skeletons -->
        <div class="loading" style="grid-column: 1/-1; height: 200px;"></div>
    </div>
</main>

<script src="shared-scripts.js"></script>
<script src="api-service.js"></script>
<script>
const HaciendaPage = {
    isUSD: false,
    rawData: [],

    async init() {
        this.bindEvents();
        await this.load();
    },

    bindEvents() {
        document.getElementById('refresh-hacienda').addEventListener('click', () => this.load());
        document.getElementById('btn-ars').addEventListener('click', () => { this.isUSD = false; this.updateUI(); });
        document.getElementById('btn-usd').addEventListener('click', () => { this.isUSD = true; this.updateUI(); });
    },

    async load() {
        const container = document.getElementById('hacienda-container');
        container.innerHTML = '<div class="loading" style="grid-column: 1/-1; height: 200px;"></div>';
        
        try {
            this.rawData = await ApiService.getHacienda();
            this.render();
        } catch (e) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--error);">Error al conectar con el Mercado de Hacienda.</div>';
        }
    },

    updateUI() {
        document.getElementById('btn-ars').classList.toggle('active', !this.isUSD);
        document.getElementById('btn-usd').classList.toggle('active', this.isUSD);
        this.render();
    },

    render() {
        const container = document.getElementById('hacienda-container');
        if (!this.rawData || !this.rawData.length) return;

        container.innerHTML = this.rawData.map(item => {
            const p1 = this.isUSD ? parseFloat(item.precio_semana_1_usd) : parseFloat(item.precio_semana_1);
            const p2 = this.isUSD ? parseFloat(item.precio_semana_2_usd) : parseFloat(item.precio_semana_2);
            const diff = p1 - p2;
            const currency = this.isUSD ? 'USD' : 'ARS';

            const trendClass = diff > 0 ? 'trend-up' : (diff < 0 ? 'trend-down' : '');
            const icon = diff > 0 ? '▲' : (diff < 0 ? '▼' : '▬');

            return `
                <div class="hacienda-card fade-in">
                    <div class="hacienda-header">
                        <span class="category-name">${item.categoria}</span>
                        <span class="trend-indicator ${trendClass}">${icon} ${Math.abs(diff).toFixed(2)}</span>
                    </div>
                    <div class="hacienda-body">
                        <div>
                            <div class="price-label">Precio Hoy</div>
                            <div class="price-main">${CalculadoraFinanciera.Formatters.currency(p1, currency)}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="price-label">Sem. Anterior</div>
                            <div style="font-size: 1.1rem; color: #666;">${CalculadoraFinanciera.Formatters.currency(p2, currency)}</div>
                        </div>
                    </div>
                    <div class="hacienda-footer">
                        <span>Cabezas: ${item.cantidad_semana_1 || '-'}</span>
                        <span>Variación: ${((diff/p2)*100).toFixed(2)}%</span>
                    </div>
                </div>
            `;
        }).join('');
    }
};

document.addEventListener('DOMContentLoaded', () => HaciendaPage.init());
</script>
</body>
</html>
