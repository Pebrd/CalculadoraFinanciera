<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pampa Finance - Screener Pro</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: #0a0a0a;
            --border-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #00d4aa;
            --header-bg: #0f0f0f;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .pro-grid {
            display: grid;
            height: calc(100vh - 65px);
            margin-top: 65px;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            background-color: #000;
        }

        .panel {
            background-color: var(--panel-bg);
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
            overflow: hidden;
        }

        .panel-header {
            padding: 5px 10px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
            color: #888;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .panel-content {
            flex: 1;
            position: relative;
            overflow: auto;
            background-color: #0a0a0a;
            padding: 8px;
        }

        /* Financial Tables */
        .fin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        
        .fin-table th, .fin-table td {
            padding: 4px 6px;
            border: 1px solid #222;
            text-align: right;
        }
        
        .fin-table th {
            background: #151515;
            font-weight: 600;
            color: #888;
            position: sticky;
            top: 0;
        }
        
        .fin-table td:first-child,
        .fin-table th:first-child {
            text-align: left;
        }
        
        .positive { color: #4caf50; }
        .negative { color: #f44336; }
        
        .indices-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .index-item {
            background: #111;
            border: 1px solid #222;
            padding: 10px 15px;
            min-width: 120px;
        }
        
        .index-name {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
        }
        
        .index-price {
            font-size: 14px;
            font-weight: bold;
            margin: 4px 0;
        }
        
        .index-change {
            font-size: 11px;
        }

        #screener-main { grid-row: 1 / 4; grid-column: 1; }
        #stocks-panel { grid-row: 1; grid-column: 2; }
        #commodities-panel { grid-row: 2; grid-column: 2; }
        #indices-panel { grid-row: 3; grid-column: 2; }

        @media (max-width: 1200px) {
            .pro-grid {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto;
            }
            #screener-main { grid-row: 1; grid-column: 1 / 3; min-height: 350px; }
            #stocks-panel { grid-row: 2; grid-column: 1; }
            #commodities-panel { grid-row: 2; grid-column: 2; }
            #indices-panel { grid-row: 3; grid-column: 1 / 3; }
        }

        @media (max-width: 768px) {
            body, html { overflow: auto; }
            .pro-grid {
                display: flex;
                flex-direction: column;
                height: auto;
                margin-top: 10px;
                margin-bottom: 80px;
                background-color: var(--bg-dark);
                gap: 10px;
                padding: 10px;
            }
            .panel { min-height: 250px; border: 1px solid var(--border-color); }
            #screener-main { min-height: 300px; }
        }
    </style>
</head>
<body>
    <script src="modern-navigation.js"></script>
    
    <main class="pro-grid">
        <!-- Screener Principal -->
        <section id="screener-main" class="panel">
            <div class="panel-header">ACCIONES ARGENTINA (BCBA)</div>
            <div class="panel-content">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                    {
                        "market": "argentina",
                        "showToolbar": false,
                        "defaultColumn": "overview",
                        "defaultScreen": "most_capitalized",
                        "isTransparent": false,
                        "locale": "es",
                        "colorTheme": "dark",
                        "width": "100%",
                        "height": "100%"
                    }
                    </script>
                </div>
            </div>
        </section>

        <!-- Acciones YFinance -->
        <section id="stocks-panel" class="panel">
            <div class="panel-header">ACCIONES MERCADO</div>
            <div class="panel-content">
                <div id="stocks-table"></div>
            </div>
        </section>

        <!-- Commodities YFinance -->
        <section id="commodities-panel" class="panel">
            <div class="panel-header">COMMODITIES</div>
            <div class="panel-content">
                <div id="commodities-table"></div>
            </div>
        </section>

        <!-- Indices YFinance -->
        <section id="indices-panel" class="panel">
            <div class="panel-header">MERCADO</div>
            <div class="panel-content">
                <div id="indices-display"></div>
            </div>
        </section>
    </main>

    <script src="screener-pro.js"></script>
    <script src="scripts/financial-tables.js"></script>
</body>
</html>
