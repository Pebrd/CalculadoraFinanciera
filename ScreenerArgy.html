<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pampa Finance - Screener Pro</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        :root {
            --bg-dark: #131722;
            --panel-bg: #1e222d;
            --border-color: #363c4e;
            --text-color: #d1d4dc;
            --accent-color: #2962ff;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif;
            overflow: hidden;
        }

        /* Responsive Grid System */
        .pro-grid {
            display: grid;
            height: calc(100vh - 60px); /* Adjust for navigation */
            grid-template-columns: 2.5fr 1fr;
            grid-template-rows: 2fr 1fr;
            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
        }

        /* Widgets Containers */
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            background: #2a2e39;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex: 1;
            position: relative;
        }

        /* Specific Areas */
        #screener-main {
            grid-row: span 1;
        }

        #multimedia-panel {
            grid-row: span 1;
        }

        #secondary-widgets {
            grid-column: span 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        #news-panel {
            grid-column: span 1;
        }

        /* YouTube Styling */
        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .channel-selector {
            padding: 5px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background: #1e222d;
        }

        .channel-btn {
            background: #2a2e39;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 10px;
            padding: 4px;
            cursor: pointer;
            text-align: center;
            border-radius: 2px;
            transition: background 0.2s;
        }

        .channel-btn:hover {
            background: #363c4e;
        }

        .channel-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* Mobile Adjustments (Adaptive) */
        @media (max-width: 768px) {
            body, html {
                overflow: auto; /* Enable scroll on mobile */
            }

            .pro-grid {
                display: flex;
                flex-direction: column;
                height: auto;
                gap: 10px;
                padding: 10px;
            }

            .panel {
                min-height: 350px;
            }

            #multimedia-panel {
                order: -1; /* Video first on mobile */
                min-height: 280px;
            }

            .channel-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            #secondary-widgets {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script src="modern-navigation.js"></script>
    
    <main class="pro-grid">
        <!-- Main Screener -->
        <section id="screener-main" class="panel">
            <div class="panel-header">Screener Acciones Argentina (BCBA)</div>
            <div class="panel-content" id="tv-screener-container">
                <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                    {
                        "market": "argentina",
                        "showToolbar": true,
                        "defaultColumn": "overview",
                        "defaultScreen": "most_capitalized",
                        "isTransparent": false,
                        "locale": "es",
                        "colorTheme": "dark",
                        "width": "100%",
                        "height": "100%"
                    }
                    </script>
                </div>
            </div>
        </section>

        <!-- Multimedia Panel -->
        <section id="multimedia-panel" class="panel">
            <div class="panel-header">
                Mercado en Vivo
                <span id="current-stream-name" style="color: var(--accent-color)">LN+</span>
            </div>
            <div class="panel-content">
                <div class="video-container">
                    <iframe id="youtube-player" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
            <div class="channel-selector" id="channel-selector">
                <!-- Channels will be added by JS -->
            </div>
        </section>

        <!-- Bonds & CEDEARS -->
        <div id="secondary-widgets">
            <section class="panel">
                <div class="panel-header">Bonos Soberanos (AL/GD)</div>
                <div class="panel-content" id="tv-bonds-container">
                    <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                        {
                            "colorTheme": "dark",
                            "locale": "es",
                            "symbolsGroups": [
                                {
                                    "name": "Bonos Globales",
                                    "symbols": [
                                        { "name": "BCBA:AL30", "displayName": "AL30" },
                                        { "name": "BCBA:GD30", "displayName": "GD30" },
                                        { "name": "BCBA:AE38", "displayName": "AE38" },
                                        { "name": "BCBA:GD38", "displayName": "GD38" },
                                        { "name": "BCBA:AL35", "displayName": "AL35" },
                                        { "name": "BCBA:GD35", "displayName": "GD35" }
                                    ]
                                }
                            ],
                            "width": "100%",
                            "height": "100%",
                            "showSymbolLogo": true,
                            "isTransparent": false
                        }
                        </script>
                    </div>
                </div>
            </section>
            <section class="panel">
                <div class="panel-header">CEDEARs Destacados</div>
                <div class="panel-content" id="tv-cedears-container">
                    <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-hotlists.js" async>
                        {
                            "colorTheme": "dark",
                            "dateRange": "1D",
                            "showChart": false,
                            "locale": "es",
                            "largeChartUrl": "",
                            "isTransparent": false,
                            "showSymbolLogo": true,
                            "showFloatingTooltip": false,
                            "exchange": "BCBA",
                            "width": "100%",
                            "height": "100%"
                        }
                        </script>
                    </div>
                </div>
            </section>
        </div>

        <!-- News / Local Data -->
        <section id="news-panel" class="panel">
            <div class="panel-header">Análisis Rápido & Noticias</div>
            <div class="panel-content" style="padding: 10px; font-size: 13px; line-height: 1.6;">
                <div id="local-highlights">
                    <p>• Cargando información local...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="screener-pro.js"></script>
</body>
</html>
