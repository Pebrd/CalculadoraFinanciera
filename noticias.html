<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Noticias | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .news-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px 10px 35px !important;
            font-size: 0.9rem !important;
            border-radius: 20px !important;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            pointer-events: none;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .news-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
            padding: 0;
        }
        .news-card:hover {
            border-color: var(--success);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.05);
        }
        .news-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .news-category {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--success);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .news-card h3 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            line-height: 1.4;
            font-weight: 600;
        }
        .news-card h3 a {
            color: #fff;
            text-decoration: none;
        }
        .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #555;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #151515;
        }
        .news-card p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        /* SKELETON LOADING */
        .skeleton {
            background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-card {
            height: 220px;
            border: 1px solid #111;
        }

        .source-tag {
            background: #151515;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.65rem;
        }

        @media (max-width: 600px) {
            .news-header-actions { flex-direction: column; align-items: stretch; }
            .search-container { max-width: none; }
        }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">News Terminal</h1>

    <div class="news-header-actions">
        <div class="agro-pill-selector" id="category-selector" style="margin-bottom: 0;">
            <button class="agro-pill active" data-cat="all">Top Stories</button>
            <button class="agro-pill" data-cat="economia">Economía</button>
            <button class="agro-pill" data-cat="finanzas">Mercados</button>
            <button class="agro-pill" data-cat="politica">Política</button>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="news-search" class="search-input" placeholder="Buscar en las noticias...">
        </div>
    </div>

    <div id="news-container" class="news-grid">
        <!-- Skeletons will be replaced by actual news -->
    </div>

    <div class="pagination-container" id="pagination" style="display: none;">
        <button id="prev-btn" class="btn btn-sm" disabled>Anterior</button>
        <button id="next-btn" class="btn btn-sm">Siguiente</button>
    </div>
</main>

<script src="shared-scripts.js"></script>
<script>
const NewsPage = {
    allArticles: [],
    filteredArticles: [],
    currentPage: 1,
    pageSize: 12,

    async init() {
        this.renderSkeletons();
        this.bindEvents();
        await this.load();
    },

    renderSkeletons() {
        const container = document.getElementById('news-container');
        container.innerHTML = Array(6).fill(0).map(() => `
            <div class="news-card skeleton-card">
                <div class="news-content">
                    <div style="width: 30%; height: 10px; margin-bottom: 15px;" class="skeleton"></div>
                    <div style="width: 90%; height: 20px; margin-bottom: 10px;" class="skeleton"></div>
                    <div style="width: 70%; height: 20px; margin-bottom: 20px;" class="skeleton"></div>
                    <div style="width: 100%; height: 60px;" class="skeleton"></div>
                </div>
            </div>
        `).join('');
    },

    bindEvents() {
        document.querySelectorAll('.agro-pill').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.agro-pill').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                this.currentPage = 1;
                this.applyFilters();
            });
        });

        document.getElementById('news-search').addEventListener('input', (e) => {
            CalculadoraFinanciera.Debouncer.debounce('news-search', () => {
                this.currentPage = 1;
                this.applyFilters();
            }, 300);
        });

        document.getElementById('prev-btn').addEventListener('click', () => { this.currentPage--; this.render(); });
        document.getElementById('next-btn').addEventListener('click', () => { this.currentPage++; this.render(); });
    },

    async load() {
        try {
            // Cargar el JSON pre-procesado por GitHub Actions
            const response = await fetch('data/news.json');
            if (!response.ok) throw new Error('No se pudo cargar el feed de noticias');
            
            const result = await response.json();
            this.allArticles = result.articles;

            this.applyFilters();
        } catch (e) {
            console.error('Error cargando noticias:', e);
            document.getElementById('news-container').innerHTML = 
                '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #555;">' +
                'Error al conectar con el servidor de noticias. Por favor, intenta más tarde.</div>';
        }
    },

    applyFilters() {
        const cat = document.querySelector('.agro-pill.active').dataset.cat;
        const query = document.getElementById('news-search').value.toLowerCase();

        this.filteredArticles = this.allArticles.filter(a => {
            const matchCat = cat === 'all' || a.category.toLowerCase().includes(cat);
            const matchSearch = !query || a.title.toLowerCase().includes(query) || (a.description && a.description.toLowerCase().includes(query));
            return matchCat && matchSearch;
        });

        this.render();
    },

    getReadingTime(text) {
        if (!text) return 1;
        const wordsPerMinute = 200;
        const noOfWords = text.split(/\s/g).length;
        const minutes = noOfWords / wordsPerMinute;
        return Math.ceil(minutes);
    },

    render() {
        const container = document.getElementById('news-container');
        const pagination = document.getElementById('pagination');
        
        if (this.filteredArticles.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #555;">No se encontraron noticias que coincidan con tu búsqueda.</div>';
            pagination.style.display = 'none';
            return;
        }

        const start = (this.currentPage - 1) * this.pageSize;
        const pageItems = this.filteredArticles.slice(start, start + this.pageSize);

        container.innerHTML = pageItems.map(a => `
            <article class="news-card fade-in">
                <div class="news-content">
                    <div class="news-category">${a.category}</div>
                    <h3><a href="${a.link}" target="_blank" rel="noopener">${a.title}</a></h3>
                    <p>${a.description || 'Haga clic para leer más en el sitio original.'}</p>
                    <div class="news-meta">
                        <span><span class="source-tag">${a.source}</span> • ${new Date(a.date).toLocaleDateString('es-AR')}</span>
                        <span>⏱️ ${this.getReadingTime(a.description) + 1} min</span>
                    </div>
                </div>
            </article>
        `).join('');

        pagination.style.display = 'flex';
        document.getElementById('prev-btn').disabled = this.currentPage === 1;
        document.getElementById('next-btn').disabled = start + this.pageSize >= this.filteredArticles.length;
        
        if (this.currentPage > 1) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
};

document.addEventListener('DOMContentLoaded', () => NewsPage.init());
</script>
</body>
</html>
