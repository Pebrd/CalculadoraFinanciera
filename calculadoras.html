<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Calculadoras | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .calc-container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .calc-card-modern {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: border-color 0.3s ease;
            position: relative;
        }

        .calc-card-modern:hover {
            border-color: #333;
        }

        .calc-card-modern h3 {
            font-size: 1.1rem;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .calc-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .calc-input-group label {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calc-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .calc-input-wrapper input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            text-align: right;
            transition: all 0.2s;
        }

        .calc-input-wrapper input:focus {
            border-color: var(--success);
            box-shadow: 0 0 10px rgba(0, 212, 170, 0.1);
        }

        .provider-select {
            background: #111;
            border: 1px solid #222;
            color: #888;
            font-size: 0.7rem;
            padding: 4px 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .provider-select:hover {
            border-color: var(--success);
            color: var(--success);
        }

        .calc-result-panel {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .calc-result-main {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
        }

        .calc-result-sub {
            font-size: 0.85rem;
            color: #00d4aa;
            opacity: 0.8;
        }

        .agro-pill-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .agro-pill {
            padding: 6px 12px;
            font-size: 0.75rem;
            background: #111;
            border: 1px solid #222;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 2px;
        }

        .agro-pill.active {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
        }

        @media (max-width: 600px) {
            .calc-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">Calculadoras</h1>

    <div class="calc-container">
        <!-- ARBITRAJE MEP/BLUE -->
        <section class="calc-card-modern slide-up">
            <h3>🔄 Arbitraje Bancos / MEP</h3>
            
            <div class="calc-input-group">
                <label>Capital Inicial (ARS)</label>
                <div class="calc-input-wrapper">
                    <input id="arb-cap" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>
                    Dólar Compra (Sale de pesos)
                    <select id="select-buy-dolar" class="provider-select">
                        <option value="">Elegir Proveedor...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="arb-buy" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>
                    Dólar Venta (Entran pesos)
                    <select id="select-sell-dolar" class="provider-select">
                        <option value="">Elegir Proveedor...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="arb-sell" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-result-panel">
                <div class="result-label">Utilidad Estimada</div>
                <div id="res-arb-profit" class="calc-result-main">--</div>
                <div id="res-arb-detail" class="calc-result-sub">Esperando datos...</div>
            </div>
        </section>

        <!-- CRIPTO (USDT) -->
        <section class="calc-card-modern slide-up" style="animation-delay: 0.1s;">
            <h3>⚡ Dólar Cripto (USDT)</h3>

            <div class="calc-input-group">
                <label>Capital Inicial (ARS)</label>
                <div class="calc-input-wrapper">
                    <input id="usdt-cap" type="text" placeholder="0,00">
                </div>
            </div>
            
            <div class="calc-input-group">
                <label>
                    Compra USDT (ARS)
                    <select id="select-buy-usdt" class="provider-select">
                        <option value="">Elegir Exchange...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="usdt-buy" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>
                    Venta USDT (ARS)
                    <select id="select-sell-usdt" class="provider-select">
                        <option value="">Elegir Exchange...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="usdt-sell" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-result-panel">
                <div class="result-label">Resultado Final</div>
                <div id="res-usdt-profit" class="calc-result-main">--</div>
                <div id="res-usdt-detail" class="calc-result-sub">Cantidad: -- USDT</div>
            </div>
        </section>

        <!-- AGRO (LIQUIDACIÓN) -->
        <section class="calc-card-modern slide-up" style="animation-delay: 0.2s;">
            <h3>🌾 Liquidación de Granos</h3>
            
            <div class="agro-pill-selector" id="crop-pills">
                <!-- Pills filled by JS from AGRO_CONFIG -->
            </div>

            <div class="calc-input-group">
                <label>Toneladas</label>
                <div class="calc-input-wrapper">
                    <input id="agro-tn" type="text" value="100,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>
                    Precio Pizarra (ARS/tn)
                    <select id="select-agro-price" class="provider-select">
                        <option value="">Cargar Pizarra...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="agro-price" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>Dólar Exportación (Blend)</label>
                <div class="calc-input-wrapper">
                    <input id="agro-blend" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-result-panel">
                <div class="result-label">Liquidación Neta (ARS)</div>
                <div id="res-agro-final" class="calc-result-main">--</div>
                <div id="res-agro-detail" class="calc-result-sub">Retenciones aplicada sobre precio</div>
            </div>
        </section>

        <!-- INVERSIONES (PLAZO FIJO) -->
        <section class="calc-card-modern slide-up" style="animation-delay: 0.3s;">
            <h3>📈 Plazo Fijo / Inversión</h3>

            <div class="calc-input-group">
                <label>Capital a Invertir (ARS)</label>
                <div class="calc-input-wrapper">
                    <input id="inv-cap" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>
                    TNA (%)
                    <select id="select-inv-tna" class="provider-select">
                        <option value="">Mejores Tasas...</option>
                    </select>
                </label>
                <div class="calc-input-wrapper">
                    <input id="inv-tna" type="text" placeholder="0,00">
                </div>
            </div>

            <div class="calc-input-group">
                <label>Plazo (Días)</label>
                <div class="calc-input-wrapper">
                    <input id="inv-dias" type="text" value="30">
                </div>
            </div>

            <div class="calc-result-panel">
                <div class="result-label">Interés Ganado</div>
                <div id="res-inv-profit" class="calc-result-main">--</div>
                <div id="res-inv-tea" class="calc-result-sub">TEA (Efectiva Anual): --%</div>
            </div>
        </section>
    </div>
</main>

<script src="shared-scripts.js"></script>
<script src="api-service.js"></script>
<script>
/**
 * Pampa Finance - Configuración de Retenciones (DEX)
 * Podés cambiar los porcentajes acá fácilmente.
 */
const AGRO_CONFIG = {
    'SO': { name: 'Soja', ret: 24 },
    'MZ': { name: 'Maíz', ret: 8.5 },
    'TR': { name: 'Trigo', ret: 7.5 },
    'GI': { name: 'Girasol', ret: 4.5 },
    'SG': { name: 'Sorgo', ret: 8.5 }
};

const Calc = {
    data: {
        dolares: [],
        usdt: {},
        granos: [],
        tasas: [],
        bancos: [],
        blend: 0
    },

    async init() {
        this.renderAgroPills();
        this.setupMasks();
        this.bindEvents();
        await this.loadData();
    },

    renderAgroPills() {
        const container = document.getElementById('crop-pills');
        container.innerHTML = Object.entries(AGRO_CONFIG).map(([id, config], index) => `
            <button class="agro-pill ${index === 0 ? 'active' : ''}" 
                    data-crop="${id}" 
                    data-ret="${config.ret}">
                ${config.name} (${config.ret}%)
            </button>
        `).join('');
    },

    async loadData() {
        try {
            const [dol, usdt, granos, bancosData] = await Promise.allSettled([
                ApiService.getDolares(),
                ApiService.getUSDT(),
                ApiService.getGranos(),
                ApiService.getBancos()
            ]);
            
            if (dol.status === 'fulfilled' && dol.value) {
                this.data.dolares = dol.value;
            }

            if (bancosData.status === 'fulfilled' && bancosData.value) {
                const { criptoya, comparadolar } = bancosData.value;
                let processedBancos = [];
                if (criptoya) {
                    for (const [name, prices] of Object.entries(criptoya)) {
                        if (prices.ask && prices.bid) processedBancos.push({ entity: name, ask: prices.ask, bid: prices.bid });
                    }
                }
                this.data.bancos = processedBancos;
            }

            this.populateDolarSelects();

            if (usdt.status === 'fulfilled' && usdt.value) {
                this.data.usdt = usdt.value.data || usdt.value;
                this.populateUSDTSelects();
            }
            if (granos.status === 'fulfilled' && granos.value) {
                this.data.granos = granos.value;
                this.populateAgroSelects();
            }
            
            const pf = await ApiService.getSmartData('plazofijo', ApiService.URLS.ARG_DATOS_PF);
            if (pf) {
                this.data.tasas = pf;
                this.populateInvSelects();
            }

            // Dólar Blend aproximado (80% Oficial + 20% CCL)
            const oficial = this.data.dolares.find(d => d.nombre.toLowerCase().includes('oficial'))?.venta;
            const ccl = this.data.dolares.find(d => d.nombre.toLowerCase().includes('contado'))?.venta;
            if (oficial && ccl) {
                this.data.blend = (oficial * 0.8) + (ccl * 0.2);
                this.setVal('agro-blend', this.data.blend);
            }
        } catch (e) {
            console.error("Error cargando datos:", e);
        }
    },

    populateDolarSelects() {
        const buySelect = document.getElementById('select-buy-dolar');
        const sellSelect = document.getElementById('select-sell-dolar');
        buySelect.innerHTML = '<option value="">Elegir Proveedor...</option>';
        sellSelect.innerHTML = '<option value="">Elegir Proveedor...</option>';

        const marketGroupBuy = document.createElement('optgroup');
        marketGroupBuy.label = "Mercados (Venta)";
        const marketGroupSell = document.createElement('optgroup');
        marketGroupSell.label = "Mercados (Compra)";

        this.data.dolares.forEach(d => {
            const name = d.nombre.replace('Dolar ', '');
            marketGroupBuy.appendChild(new Option(`${name} ($${d.venta})`, d.venta));
            marketGroupSell.appendChild(new Option(`${name} ($${d.compra})`, d.compra));
        });
        buySelect.add(marketGroupBuy);
        sellSelect.add(marketGroupSell);

        if (this.data.bancos.length > 0) {
            const bankGroupBuy = document.createElement('optgroup');
            bankGroupBuy.label = "Bancos (Venta)";
            const bankGroupSell = document.createElement('optgroup');
            bankGroupSell.label = "Bancos (Compra)";

            this.data.bancos.sort((a, b) => a.entity.localeCompare(b.entity)).forEach(b => {
                const name = b.entity.charAt(0).toUpperCase() + b.entity.slice(1);
                bankGroupBuy.appendChild(new Option(`${name} ($${b.ask})`, b.ask));
                bankGroupSell.appendChild(new Option(`${name} ($${b.bid})`, b.bid));
            });
            buySelect.add(bankGroupBuy);
            sellSelect.add(bankGroupSell);
        }
    },

    populateUSDTSelects() {
        const buySelect = document.getElementById('select-buy-usdt');
        const sellSelect = document.getElementById('select-sell-usdt');
        buySelect.innerHTML = '<option value="">Elegir Exchange...</option>';
        sellSelect.innerHTML = '<option value="">Elegir Exchange...</option>';

        if (!this.data.usdt) return;
        Object.entries(this.data.usdt).forEach(([name, prices]) => {
            const prettyName = name.charAt(0).toUpperCase() + name.slice(1);
            if (prices.ask) buySelect.add(new Option(`${prettyName} ($${prices.ask})`, prices.ask));
            if (prices.bid) sellSelect.add(new Option(`${prettyName} ($${prices.bid})`, prices.bid));
        });
    },

    populateAgroSelects() {
        const agroSelect = document.getElementById('select-agro-price');
        agroSelect.innerHTML = '<option value="">Cargar Pizarra...</option>';
        if (!this.data.granos) return;

        this.data.granos.forEach(g => {
            agroSelect.add(new Option(`${g.nombre} (Rosario) - $${g.importe}`, g.importe));
        });
        this.autoFillAgroPrice();
    },

    autoFillAgroPrice() {
        if (!this.data.granos) return;
        const activeCrop = document.querySelector('.agro-pill.active').dataset.crop;
        const match = this.data.granos.find(g => g.producto === activeCrop);
        if (match) {
            this.setVal('agro-price', parseFloat(match.importe));
        }
    },

    populateInvSelects() {
        const invSelect = document.getElementById('select-inv-tna');
        invSelect.innerHTML = '<option value="">Mejores Tasas...</option>';
        if (!this.data.tasas) return;
        this.data.tasas.filter(t => t.tnaClientes > 0).sort((a, b) => b.tnaClientes - a.tnaClientes).forEach(b => {
            const tna = (b.tnaClientes * 100).toFixed(2);
            invSelect.add(new Option(`${b.entidad} (${tna}%)`, tna));
        });
    },

    setupMasks() {
        const currencyIds = ['arb-cap', 'arb-buy', 'arb-sell', 'usdt-cap', 'usdt-buy', 'usdt-sell', 'agro-price', 'agro-blend', 'inv-cap'];
        const simpleIds = ['inv-tna', 'agro-tn', 'inv-dias'];

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', (e) => {
                const id = e.target.id;
                if (currencyIds.includes(id)) {
                    // Máscara de moneda (2 decimales fijos)
                    let val = e.target.value.replace(/[^\d]/g, '');
                    if (val !== '') {
                        if (val.length < 3) val = val.padStart(3, '0');
                        const integerPart = val.slice(0, -2).replace(/^0+/, '') || '0';
                        const decimalPart = val.slice(-2);
                        e.target.value = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ',' + decimalPart;
                    }
                } else if (simpleIds.includes(id)) {
                    // Entrada libre (porcentajes, días, etc.)
                    let val = e.target.value.replace(/[^0-9,]/g, '');
                    const parts = val.split(',');
                    if (parts.length > 2) val = parts[0] + ',' + parts.slice(1).join('');
                    e.target.value = val;
                }
                this.calculateAll();
            });
        });
    },

    bindEvents() {
        document.getElementById('select-buy-dolar').addEventListener('change', (e) => this.setVal('arb-buy', parseFloat(e.target.value)));
        document.getElementById('select-sell-dolar').addEventListener('change', (e) => this.setVal('arb-sell', parseFloat(e.target.value)));
        document.getElementById('select-buy-usdt').addEventListener('change', (e) => this.setVal('usdt-buy', parseFloat(e.target.value)));
        document.getElementById('select-sell-usdt').addEventListener('change', (e) => this.setVal('usdt-sell', parseFloat(e.target.value)));
        document.getElementById('select-agro-price').addEventListener('change', (e) => this.setVal('agro-price', parseFloat(e.target.value)));
        document.getElementById('select-inv-tna').addEventListener('change', (e) => this.setVal('inv-tna', parseFloat(e.target.value)));

        document.getElementById('crop-pills').addEventListener('click', (e) => {
            if (e.target.classList.contains('agro-pill')) {
                document.querySelectorAll('.agro-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                this.autoFillAgroPrice();
                this.calculateAll();
            }
        });
    },

    getVal(id) {
        const input = document.getElementById(id);
        if (!input || !input.value) return 0;
        const currencyIds = ['arb-cap', 'arb-buy', 'arb-sell', 'usdt-cap', 'usdt-buy', 'usdt-sell', 'agro-price', 'agro-blend', 'inv-cap'];
        
        if (currencyIds.includes(id)) {
            return parseFloat(input.value.replace(/\./g, '').replace(',', '.')) || 0;
        }
        return parseFloat(input.value.replace(',', '.')) || 0;
    },

    setVal(id, val) {
        if (val === undefined || val === null) return;
        const input = document.getElementById(id);
        if (!input) return;

        const currencyIds = ['arb-cap', 'arb-buy', 'arb-sell', 'usdt-cap', 'usdt-buy', 'usdt-sell', 'agro-price', 'agro-blend', 'inv-cap'];

        if (currencyIds.includes(id)) {
            const fixed = (Math.round(val * 100) / 100).toFixed(2).replace('.', '');
            let v = fixed;
            if (v.length < 3) v = v.padStart(3, '0');
            const integerPart = v.slice(0, -2).replace(/^0+/, '') || '0';
            const decimalPart = v.slice(-2);
            input.value = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ',' + decimalPart;
        } else {
            // Formato simple para % y días
            input.value = val.toString().replace('.', ',');
        }
        this.calculateAll();
    },

    calculateAll() {
        this.calcArbitraje();
        this.calcUSDT();
        this.calcAgro();
        this.calcInversion();
    },

    calcArbitraje() {
        const cap = this.getVal('arb-cap');
        const buy = this.getVal('arb-buy');
        const sell = this.getVal('arb-sell');
        const resProfit = document.getElementById('res-arb-profit');
        const resDetail = document.getElementById('res-arb-detail');

        if (!cap || !buy || !sell) {
            resProfit.textContent = '--';
            resDetail.textContent = 'Esperando datos...';
            return;
        }

        const usd = cap / buy;
        const total = usd * sell;
        const profit = total - cap;
        const pct = (profit / cap) * 100;

        resProfit.textContent = CalculadoraFinanciera.Formatters.currency(profit);
        resDetail.textContent = `Rinde ${pct.toFixed(2)}% | Final: ${CalculadoraFinanciera.Formatters.currency(total)}`;
    },

    calcUSDT() {
        const cap = this.getVal('usdt-cap');
        const buy = this.getVal('usdt-buy');
        const sell = this.getVal('usdt-sell');
        const resProfit = document.getElementById('res-usdt-profit');
        const resDetail = document.getElementById('res-usdt-detail');

        if (!cap || !buy || !sell) {
            resProfit.textContent = '--';
            resDetail.textContent = 'Cantidad: -- USDT';
            return;
        }

        const usdt = cap / buy;
        const total = usdt * sell;
        const profit = total - cap;
        
        resProfit.textContent = CalculadoraFinanciera.Formatters.currency(profit);
        resDetail.textContent = `Cantidad: ${usdt.toFixed(4)} USDT | Final: ${CalculadoraFinanciera.Formatters.currency(total)}`;
    },

    calcAgro() {
        const tn = this.getVal('agro-tn');
        const priceArs = this.getVal('agro-price'); // Viene de la Pizarra en ARS
        const blend = this.getVal('agro-blend');
        const activePill = document.querySelector('.agro-pill.active');
        const ret = parseFloat(activePill.dataset.ret);
        const resFinal = document.getElementById('res-agro-final');
        const resDetail = document.getElementById('res-agro-detail');

        if (!priceArs || !blend) {
            resFinal.textContent = '--';
            resDetail.textContent = '--';
            return;
        }

        // Cálculo: Liquidación neta considerando que la Pizarra ya es ARS
        // El usuario quiere aplicar la retención sobre el precio pizarra.
        const totalBrutoArs = tn * priceArs;
        const retencionArs = totalBrutoArs * (ret / 100);
        const finalArs = totalBrutoArs - retencionArs;

        // Mostrar conversión teórica a USD Blend para referencia
        const finalUsd = finalArs / blend;

        resFinal.textContent = CalculadoraFinanciera.Formatters.currency(finalArs);
        resDetail.textContent = `Retención (${ret}%): ${CalculadoraFinanciera.Formatters.currency(retencionArs)} | Teórico: U$S ${finalUsd.toFixed(2)}`;
    },

    calcInversion() {
        const cap = this.getVal('inv-cap');
        const tna = this.getVal('inv-tna');
        const diasInput = document.getElementById('inv-dias');
        const dias = diasInput.value.replace(/[^\d]/g, '') || 30;
        const resProfit = document.getElementById('res-inv-profit');
        const resTea = document.getElementById('res-inv-tea');

        if (!tna) {
            resProfit.textContent = '--';
            resTea.textContent = 'TEA: --%';
            return;
        }

        const tnaDec = tna / 100;
        
        // FÓRMULA NORMATIVA BCRA: TEA = [ (1 + TNA*30/365)^(365/30) - 1 ]
        const tea = (Math.pow(1 + (tnaDec * 30 / 365), 365 / 30) - 1) * 100;
        
        resTea.textContent = `TEA (Efectiva Anual): ${tea.toFixed(2)}%`;

        if (cap) {
            const profit = cap * tnaDec * (parseInt(dias) / 365);
            resProfit.textContent = CalculadoraFinanciera.Formatters.currency(profit);
        } else {
            resProfit.textContent = '--';
        }
    }
};

document.addEventListener('DOMContentLoaded', () => Calc.init());
</script>
</body>
</html>
