<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores y Gráficos | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .indicator-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .indicator-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .indicator-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }
        .indicator-diff {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .chart-section {
            background: #050505;
            border: 1px solid #111;
            padding: 25px;
            margin-bottom: 30px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .chart-container {
            height: 350px;
            position: relative;
        }
        .variacion.up { color: var(--error); }
        .variacion.down { color: var(--success); }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">Tablero de Indicadores</h1>

    <div class="indicators-grid">
        <div class="indicator-card fade-in">
            <div class="indicator-label">📈 Inflación Mensual</div>
            <div id="inflacion-mensual" class="indicator-value">--</div>
            <div id="inflacion-variacion" class="indicator-diff"></div>
        </div>
        <div class="indicator-card fade-in" style="animation-delay: 0.1s;">
            <div class="indicator-label">📊 Riesgo País</div>
            <div id="riesgo-valor" class="indicator-value">--</div>
            <div id="riesgo-variacion" class="indicator-diff"></div>
        </div>
        <div class="indicator-card fade-in" style="animation-delay: 0.2s;">
            <div class="indicator-label">🏠 Valor UVA</div>
            <div id="uva-valor" class="indicator-value">--</div>
            <div id="uva-variacion" class="indicator-diff"></div>
        </div>
        <div class="indicator-card fade-in" style="animation-delay: 0.3s;">
            <div class="indicator-label">💰 Reservas BCRA</div>
            <div id="bcra-valor" class="indicator-value">--</div>
            <div id="bcra-variacion" class="indicator-diff"></div>
        </div>
    </div>

    <!-- GRÁFICOS -->
    <section class="chart-section slide-up">
        <div class="chart-header">
            <h2 class="section-title" style="margin-bottom: 0;">Inflación Mensual (%)</h2>
            <div class="filter-buttons" data-chart-id="chartInflacionMensual" data-raw-data-key="inflacionMensual">
                <button class="agro-pill active" data-period="1">1A</button>
                <button class="agro-pill" data-period="5">5A</button>
                <button class="agro-pill" data-period="0">MAX</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="chartInflacionMensual"></canvas>
        </div>
    </section>

    <section class="chart-section slide-up">
        <div class="chart-header">
            <h2 class="section-title" style="margin-bottom: 0;">Riesgo País (PB)</h2>
            <div class="filter-buttons" data-chart-id="chartRiesgoPais" data-raw-data-key="riesgoPais">
                <button class="agro-pill active" data-period="1">1A</button>
                <button class="agro-pill" data-period="5">5A</button>
                <button class="agro-pill" data-period="0">MAX</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="chartRiesgoPais"></canvas>
        </div>
    </section>

    <section class="chart-section slide-up">
        <div class="chart-header">
            <h2 class="section-title" style="margin-bottom: 0;">Unidad de Vivienda (UVA)</h2>
            <div class="filter-buttons" data-chart-id="chartUVA" data-raw-data-key="uva">
                <button class="agro-pill active" data-period="1">1A</button>
                <button class="agro-pill" data-period="5">5A</button>
                <button class="agro-pill" data-period="0">MAX</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="chartUVA"></canvas>
        </div>
    </section>
</main>

<script src="shared-scripts.js"></script>
<script src="api-service.js"></script>
<script>
/**
 * Indicators & Charts Page Logic
 */
const IndicatorsPage = {
    charts: {},
    rawData: {},

    async init() {
        this.bindEvents();
        await Promise.all([
            this.loadIndicators(),
            this.loadCharts()
        ]);
    },

    bindEvents() {
        document.querySelectorAll('.filter-buttons').forEach(container => {
            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('agro-pill')) {
                    container.querySelectorAll('.agro-pill').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    this.updateChart(container.dataset.chartId, container.dataset.rawDataKey, parseInt(e.target.dataset.period));
                }
            });
        });
    },

    async loadIndicators() {
        // Inflación
        try {
            const data = await ApiService.fetchWithProxy("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
            const ult = data[data.length - 1];
            const ant = data[data.length - 2];
            document.getElementById('inflacion-mensual').textContent = ult.valor.toFixed(2) + '%';
            this.renderDiff('inflacion-variacion', ult.valor, ant.valor, 'up');
        } catch (e) {}

        // Riesgo País
        try {
            const data = await ApiService.fetchWithProxy("https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais");
            const ult = data[data.length - 1];
            const ant = data[data.length - 2];
            document.getElementById('riesgo-valor').textContent = ult.valor + ' pts';
            this.renderDiff('riesgo-variacion', ult.valor, ant.valor, 'up');
        } catch (e) {}

        // UVA
        try {
            const data = await ApiService.fetchWithProxy("https://api.argentinadatos.com/v1/finanzas/indices/uva");
            const ult = data[data.length - 1];
            const ant = data[data.length - 2];
            document.getElementById('uva-valor').textContent = ult.valor.toFixed(2);
            this.renderDiff('uva-variacion', ult.valor, ant.valor, 'up');
        } catch (e) {}

        // Reservas BCRA (Usando Proxy para la API del BCRA)
        try {
            const res = await ApiService.fetchWithProxy('https://api.bcra.gob.ar/estadisticas/v4.0/Monetarias/1');
            const detail = res.results[0].detalle;
            const ult = detail[0];
            const ant = detail[1];
            // Los valores del BCRA vienen en millones de USD. Dividimos por 1000 para Billones (escala corta).
            document.getElementById('bcra-valor').textContent = 'U$S ' + (ult.valor / 1000).toFixed(1) + 'B';
            this.renderDiff('bcra-variacion', ult.valor, ant.valor, 'down'); // Subir Reservas es bueno
        } catch (e) {
            console.error("Error cargando reservas BCRA:", e);
            document.getElementById('bcra-valor').textContent = 'N/A';
        }
    },

    renderDiff(id, actual, anterior, type) {
        const el = document.getElementById(id);
        const diff = ((actual - anterior) / anterior) * 100;
        const isUp = diff > 0;
        const colorClass = (type === 'up') ? (isUp ? 'up' : 'down') : (isUp ? 'down' : 'up');
        el.className = `indicator-diff variacion ${colorClass}`;
        el.textContent = `${isUp ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)}%`;
    },

    async loadCharts() {
        const endpoints = {
            inflacionMensual: "https://api.argentinadatos.com/v1/finanzas/indices/inflacion",
            riesgoPais: "https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais",
            uva: "https://api.argentinadatos.com/v1/finanzas/indices/uva"
        };

        for (const [key, url] of Object.entries(endpoints)) {
            try {
                const data = await ApiService.fetchWithProxy(url);
                this.rawData[key] = data.map(d => ({ x: d.fecha, y: d.valor }));
                this.updateChart(`chart${key.charAt(0).toUpperCase() + key.slice(1)}`, key, 1);
            } catch (e) {}
        }
    },

    updateChart(chartId, dataKey, years) {
        let data = this.rawData[dataKey];
        if (years > 0) {
            const cutoff = new Date();
            cutoff.setFullYear(cutoff.getFullYear() - years);
            data = data.filter(d => new Date(d.x) >= cutoff);
        }

        const ctx = document.getElementById(chartId).getContext('2d');
        const color = chartId.includes('Inflacion') ? '#ff4757' : (chartId.includes('Riesgo') ? '#3742fa' : '#ffa502');

        if (this.charts[chartId]) {
            this.charts[chartId].data.datasets[0].data = data;
            this.charts[chartId].update();
        } else {
            this.charts[chartId] = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        data: data,
                        borderColor: color,
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.1,
                        fill: true,
                        backgroundColor: color + '10'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'month' }, grid: { display: false } },
                        y: { grid: { color: '#111' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    }
};

document.addEventListener('DOMContentLoaded', () => IndicatorsPage.init());
</script>
</body>
</html>
