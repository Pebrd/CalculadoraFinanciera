name: Fetch Data

on:
  schedule:
    # Lunes a Viernes: 10:00 - 17:00 ART (13:00 - 20:00 UTC) Cada 15 min
    - cron: '*/15 13-20 * * 1-5'
    # Lunes a Viernes: Resto del tiempo (0-12, 21-23 UTC) Cada 40 min
    - cron: '0,40 0-12,21-23 * * 1-5'
    # Fines de semana: Cada 1.5 horas (90 min)
    - cron: '0 0,3,6,9,12,15,18,21 * * 0,6'
    - cron: '30 1,4,7,10,13,16,19,22 * * 0,6'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data
        run: node scripts/fetch_data.js

      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "chore: update static data [skip ci]"
          git push
