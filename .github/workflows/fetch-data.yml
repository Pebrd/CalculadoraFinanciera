name: Fetch Data

on:
  schedule:
    # 1. COTIZACIONES: Cada 5 min (Lunes-Viernes 10-17 ART / 13-20 UTC)
    - cron: '*/5 13-20 * * 1-5'
    
    # 2. PIZARRA: Cada 30 min (Lunes-Viernes 10-17 ART / 13-20 UTC)
    # (Ya está cubierto por el de 5 min, el script puede manejarlo o usamos un cron separado)
    - cron: '*/30 * * * *'
    
    # 3. TASAS/CAÑUELAS/NOTICIAS: 4 veces al día (Cada 6 horas)
    - cron: '0 0,6,12,18 * * *'

  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Financial Data
        run: |
          # Determinar qué modo usar basado en la hora/minuto
          # (Lógica simple: si el minuto es divisible por 30, hacemos pizarra. 
          # Si la hora es divisible por 6, hacemos rates/news/all)
          
          MINUTE=$(date +%-M)
          HOUR=$(date +%-H)
          DAY=$(date +%u)

          if [ $((HOUR % 6)) -eq 0 ] && [ "$MINUTE" -eq 0 ]; then
            echo "Running FULL UPDATE"
            node scripts/fetch_data.js --all
          elif [ $((MINUTE % 30)) -eq 0 ]; then
            echo "Running AGRO + QUOTES update"
            node scripts/fetch_data.js --agro
            node scripts/fetch_data.js --quotes
          else
            echo "Running QUOTES update only"
            node scripts/fetch_data.js --quotes
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update financial data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
