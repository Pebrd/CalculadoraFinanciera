<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plazo Fijo | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .sub-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .pf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: var(--max-width);
            margin: 0 auto;
        }
        .pf-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.3s ease;
            position: relative;
        }
        .pf-card:hover {
            border-color: var(--success);
            transform: translateY(-4px);
        }
        .pf-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #151515;
            padding-bottom: 15px;
        }
        .bank-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }
        .pf-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .tna-box {
            display: flex;
            flex-direction: column;
        }
        .tna-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success);
            line-height: 1;
        }
        .tna-label {
            font-size: 0.7rem;
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .non-client-badge {
            background: #111;
            border: 1px solid #222;
            color: #666;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 2px;
        }
        .pf-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-divider {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 0 20px 0;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: #151515;
        }

        /* Modal Details */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--success); padding: 40px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 0 50px rgba(0, 212, 170, 0.1);
        }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">Tasas Plazo Fijo</h1>

    <div class="sub-nav">
        <a href="tasas.html" class="agro-pill">Bancos Digitales</a>
        <a href="plazo-fijo.html" class="agro-pill active">Plazo Fijo</a>
    </div>

    <div class="controls">
        <button id="refresh-btn" class="btn btn-sm">🔄 Sincronizar Bancos</button>
        <div id="sync-status" class="text-secondary" style="font-size: 0.8rem;">Actualizando...</div>
    </div>

    <div id="pf-container" class="pf-grid">
        <!-- Skeletons -->
        <div class="loading" style="grid-column: 1/-1; height: 200px;"></div>
    </div>
</main>

<div id="conditions-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-bank" style="color: var(--success); margin-bottom: 10px;"></h2>
        <p style="color: #555; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 20px;">Tasa No Clientes</p>
        <div id="modal-tna" style="font-size: 3.5rem; font-weight: 800; color: #fff; margin-bottom: 30px;"></div>
        <button onclick="closeModal()" class="btn btn-sm" style="width: 100%;">Entendido</button>
    </div>
</div>

<script src="shared-scripts.js"></script>
<script src="api-service.js"></script>
<script>
const PFPage = {
    async init() {
        this.bindEvents();
        await this.load();
    },

    bindEvents() {
        document.getElementById('refresh-btn').addEventListener('click', () => this.load());
        window.onclick = (e) => { if (e.target.id === 'conditions-modal') closeModal(); };
    },

    async load() {
        const container = document.getElementById('pf-container');
        const status = document.getElementById('sync-status');
        container.innerHTML = '<div class="loading" style="grid-column: 1/-1; height: 200px;"></div>';

        try {
            const data = await ApiService.getSmartData('plazofijo', ApiService.URLS.ARG_DATOS_PF);
            if (!data) throw new Error("No data");

            const conClientes = data.filter(item => item.tnaClientes > 0).sort((a, b) => b.tnaClientes - a.tnaClientes);
            const soloNoClientes = data.filter(item => (!item.tnaClientes || item.tnaClientes == 0) && item.tnaNoClientes > 0).sort((a, b) => b.tnaNoClientes - a.tnaNoClientes);

            this.render(conClientes, soloNoClientes);
            status.textContent = `Sincronizado: ${CalculadoraFinanciera.Formatters.time()}`;
        } catch (e) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--error);">Error al obtener tasas de bancos.</div>';
        }
    },

    render(conClientes, soloNoClientes) {
        const container = document.getElementById('pf-container');
        let html = conClientes.map(item => this.createCard(item, true)).join('');

        if (soloNoClientes.length > 0) {
            html += `<div class="section-divider">Tasas No Clientes</div>`;
            html += soloNoClientes.map(item => this.createCard(item, false)).join('');
        }

        container.innerHTML = html;
    },

    createCard(item, isClient) {
        const tna = isClient ? item.tnaClientes : item.tnaNoClientes;
        const hasAlternative = !isClient || (item.tnaNoClientes > 0 && item.tnaNoClientes !== item.tnaClientes);
        const icon = ApiService.getIcon ? ApiService.getIcon(item.entidad) : null;

        return `
            <div class="pf-card fade-in">
                <div class="pf-header">
                    ${item.logo ? `<img src="${item.logo}" width="28" height="28" style="border-radius:4px; background:#fff; padding:2px;">` : '🏦'}
                    <span class="bank-name">${item.entidad}</span>
                </div>
                <div class="pf-body">
                    <div class="tna-box">
                        <span class="tna-value">${(tna * 100).toFixed(2)}%</span>
                        <span class="tna-label">TNA Actual</span>
                    </div>
                    ${(isClient && item.tnaNoClientes > 0 && item.tnaNoClientes !== item.tnaClientes) ? `
                        <button class="non-client-badge" onclick="openModal('${item.entidad}', '${(item.tnaNoClientes * 100).toFixed(2)}%')">
                            Ver No Clientes
                        </button>
                    ` : ''}
                </div>
                <div class="pf-footer">
                    <span style="color:#333; font-size:0.65rem;">Mínimo 30 días</span>
                    <span style="color:var(--success); font-size:0.65rem; font-weight:700;">ARS</span>
                </div>
            </div>
        `;
    }
};

function openModal(bank, tna) {
    document.getElementById('modal-bank').textContent = bank;
    document.getElementById('modal-tna').textContent = tna;
    document.getElementById('conditions-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('conditions-modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => PFPage.init());
</script>
</body>
</html>
