<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasas y Rendimientos | Pampa Finance</title>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .sub-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: var(--max-width);
            margin: 0 auto;
        }
        .rate-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: border-color 0.2s;
        }
        .rate-card:hover {
            border-color: var(--success);
        }
        .rate-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #151515;
            padding-bottom: 12px;
        }
        .bank-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }
        .rate-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tna-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--success);
        }
        .tea-value {
            font-size: 0.8rem;
            color: #555;
        }
        .rate-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #444;
        }
        .btn-details {
            background: transparent;
            border: 1px solid #222;
            color: #666;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-details:hover {
            border-color: var(--success);
            color: var(--success);
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--success); padding: 30px;
            max-width: 450px; width: 90%; text-align: center;
        }
    </style>
</head>
<body>
<script src="modern-navigation.js"></script>

<main class="main-container">
    <h1 class="page-title fade-in">Rendimientos ARS</h1>

    <div class="sub-nav">
        <a href="tasas.html" class="agro-pill active">Bancos Digitales</a>
        <a href="plazo-fijo.html" class="agro-pill">Plazo Fijo</a>
    </div>

    <div class="controls">
        <button id="refresh-btn" class="btn btn-sm">🔄 Sincronizar Tasas</button>
        <div id="sync-status" class="text-secondary" style="font-size: 0.8rem;">Actualizando...</div>
    </div>

    <div id="rates-container" class="rates-grid">
        <!-- Skeletons -->
        <div class="loading" style="grid-column: 1/-1; height: 200px;"></div>
    </div>
</main>

<div id="details-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title" style="color: var(--success); margin-bottom: 15px;"></h3>
        <div id="modal-body" style="color: #888; line-height: 1.6; margin-bottom: 20px;"></div>
        <button onclick="closeModal()" class="btn btn-sm">Cerrar</button>
    </div>
</div>

<script src="shared-scripts.js"></script>
<script src="api-service.js"></script>
<script>
const TasasPage = {
    async init() {
        this.bindEvents();
        await this.load();
    },

    bindEvents() {
        document.getElementById('refresh-btn').addEventListener('click', () => this.load());
        window.onclick = (e) => { if (e.target.id === 'details-modal') closeModal(); };
    },

    async load() {
        const container = document.getElementById('rates-container');
        const status = document.getElementById('sync-status');
        container.innerHTML = '<div class="loading" style="grid-column: 1/-1; height: 200px;"></div>';

        try {
            const { argDatos, tasasAr } = await ApiService.getTasas();
            let merged = [];

            if (argDatos) {
                argDatos.forEach(item => {
                    merged.push({
                        name: item.fondo,
                        tna: parseFloat(item.tna) * 100,
                        tea: item.tea ? parseFloat(item.tea) * 100 : null,
                        date: item.fecha,
                        conditions: item.condiciones || "",
                        limit: item.tope
                    });
                });
            }

            if (tasasAr) {
                tasasAr.data.forEach(item => {
                    if (!merged.some(d => d.name.toLowerCase().includes(item.name.toLowerCase()))) {
                        merged.push({
                            name: item.name,
                            tna: parseFloat(item.tna),
                            tea: item.tea ? parseFloat(item.tea) : null,
                            date: 'Hoy',
                            conditions: item.tna_conditions?.[0]?.description || "",
                            limit: item.maxAmount
                        });
                    }
                });
            }

            merged.sort((a, b) => b.tna - a.tna);
            this.render(merged);
            status.textContent = `Sincronizado: ${CalculadoraFinanciera.Formatters.time()}`;
        } catch (e) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--error);">Error al cargar tasas.</div>';
        }
    },

    render(data) {
        const container = document.getElementById('rates-container');
        container.innerHTML = data.map(item => {
            const icon = ApiService.getIcon ? ApiService.getIcon(item.name) : null;
            return `
                <div class="rate-card fade-in">
                    <div class="rate-header">
                        ${icon ? `<img src="${icon}" width="24" height="24" style="border-radius:50%;">` : '🏦'}
                        <span class="bank-name">${item.name}</span>
                    </div>
                    <div class="rate-body">
                        <div>
                            <div class="tna-value">${item.tna.toFixed(2)}%</div>
                            <div class="text-secondary" style="font-size: 0.7rem; font-weight: 700;">TNA</div>
                        </div>
                        ${item.tea ? `
                        <div style="text-align: right;">
                            <div class="tea-value">TEA: ${item.tea.toFixed(2)}%</div>
                        </div>` : ''}
                    </div>
                    <div class="rate-footer">
                        <span>Actualizado: ${item.date}</span>
                        ${item.conditions ? `<button class="btn-details" onclick="openModal('${item.name}', '${item.conditions.replace(/'/g, "\\'")}')">Detalles</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }
};

function openModal(title, body) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent = body;
    document.getElementById('details-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('details-modal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => TasasPage.init());
</script>
</body>
</html>
